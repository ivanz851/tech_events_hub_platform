openapi: 3.1.0
info:
  title: Scrapper API
  version: 2.0.0
  contact:
    name: Ivan Zakharov
    url: https://github.com
security:
  - BearerAuth: []
  - TgChatId: []
paths:
  /auth/yandex/login:
    get:
      summary: Редирект на страницу авторизации Яндекса
      security: []
      responses:
        '302':
          description: Редирект на OAuth-страницу Яндекса
  /auth/yandex/callback:
    get:
      summary: Обмен кода на JWT
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Успешная авторизация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Некорректный код авторизации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /auth/telegram/link-token:
    post:
      summary: Генерация токена для связывания Telegram-аккаунта
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Токен создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkTokenResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /auth/telegram/link:
    post:
      summary: Привязка Telegram-аккаунта к Web-аккаунту
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkTelegramRequest'
      responses:
        '200':
          description: Аккаунты успешно связаны
        '400':
          description: Неверный или истёкший токен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /tg-chat/{id}:
    post:
      summary: Зарегистрировать чат
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Чат зарегистрирован
        '400':
          description: Некорректные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Чат уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      summary: Удалить чат
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Чат успешно удалён
        '400':
          description: Некорректные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Чат не существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /links:
    get:
      summary: Получить все отслеживаемые ссылки
      security:
        - BearerAuth: []
        - TgChatId: []
      parameters:
        - name: Tg-Chat-Id
          in: header
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Ссылки успешно получены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListLinksResponse'
        '400':
          description: Некорректные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      summary: Добавить отслеживание ссылки
      security:
        - BearerAuth: []
        - TgChatId: []
      parameters:
        - name: Tg-Chat-Id
          in: header
          required: false
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddLinkRequest'
        required: true
      responses:
        '200':
          description: Ссылка успешно добавлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkResponse'
        '400':
          description: Некорректные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Ссылка уже отслеживается
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      summary: Убрать отслеживание ссылки
      security:
        - BearerAuth: []
        - TgChatId: []
      parameters:
        - name: Tg-Chat-Id
          in: header
          required: false
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveLinkRequest'
        required: true
      responses:
        '200':
          description: Ссылка успешно убрана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkResponse'
        '400':
          description: Некорректные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Ссылка не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    TgChatId:
      type: apiKey
      in: header
      name: Tg-Chat-Id
  schemas:
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
    LinkTokenResponse:
      type: object
      properties:
        link_token:
          type: string
    LinkTelegramRequest:
      type: object
      required:
        - link_token
        - tg_chat_id
      properties:
        link_token:
          type: string
        tg_chat_id:
          type: integer
          format: int64
    SubscriptionFilters:
      type: object
      properties:
        city:
          type: string
          nullable: true
        date_from:
          type: string
          format: date
          nullable: true
        date_to:
          type: string
          format: date
          nullable: true
        is_free:
          type: boolean
          nullable: true
        categories:
          type: array
          items:
            type: string
        format:
          type: string
          enum: [offline, online, hybrid]
          nullable: true
    LinkResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        url:
          type: string
          format: uri
        filters:
          $ref: '#/components/schemas/SubscriptionFilters'
          nullable: true
    ApiErrorResponse:
      type: object
      properties:
        description:
          type: string
        code:
          type: string
        exceptionName:
          type: string
        exceptionMessage:
          type: string
        stacktrace:
          type: array
          items:
            type: string
    AddLinkRequest:
      type: object
      required:
        - link
      properties:
        link:
          type: string
          format: uri
        filters:
          $ref: '#/components/schemas/SubscriptionFilters'
          nullable: true
    ListLinksResponse:
      type: object
      properties:
        links:
          type: array
          items:
            $ref: '#/components/schemas/LinkResponse'
        size:
          type: integer
          format: int32
    RemoveLinkRequest:
      type: object
      properties:
        link:
          type: string
          format: uri
