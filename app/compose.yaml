services:
  postgresql:
    container_name: postgresql
    image: postgres:16
    environment:
      POSTGRES_DB: scrapper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scrapper"]
      interval: 5s
      timeout: 5s
      retries: 5

  liquibase-migrations:
    container_name: migrations
    image: liquibase/liquibase:4.29
    depends_on:
      postgresql:
        condition: service_healthy
    command:
      - --searchPath=/changesets
      - --changelog-file=master.xml
      - --driver=org.postgresql.Driver
      - --url=jdbc:postgresql://postgresql:5432/scrapper
      - --username=postgres
      - --password=postgres
      - update
    volumes:
      - ./migrations:/changesets
    networks:
      - backend

  kafka:
    container_name: kafka
    image: apache/kafka-native:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - backend

  redis:
    container_name: redis
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend

  bot:
    container_name: bot
    build:
      context: .
      dockerfile: bot.Dockerfile
    ports:
      - "7777:7777"
      - "9000:9000"
    environment:
      BOT_API_ID: ${BOT_API_ID}
      BOT_API_HASH: ${BOT_API_HASH}
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_SCRAPPER_BASE_URL: http://scrapper:8080
      BOT_REDIS_URL: redis://redis:6379
      BOT_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BOT_METRICS_PORT: 9000
    depends_on:
      - redis
      - kafka
    networks:
      - backend

  scrapper:
    container_name: scrapper
    build:
      context: .
      dockerfile: scrapper.Dockerfile
    ports:
      - "8080:8080"
      - "9001:9001"
    environment:
      BOT_API_ID: ${BOT_API_ID}
      BOT_API_HASH: ${BOT_API_HASH}
      SCRAPPER_BOT_BASE_URL: http://bot:7777/api/v1
      SCRAPPER_DB_URL: postgresql+psycopg://postgres:postgres@postgresql:5432/scrapper
      SCRAPPER_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCRAPPER_METRICS_PORT: 9001
    depends_on:
      liquibase-migrations:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    networks:
      - backend

  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    depends_on:
      - bot
      - scrapper
    networks:
      - backend

  mailpit:
    container_name: mailpit
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - backend

  grafana:
    container_name: grafana
    image: grafana/grafana-oss:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  kafka_data:
  redis_data:
  prometheus_data:
  grafana_data:
